---
apiVersion: v1
kind: Service
metadata:
  name: go-echo-service
  namespace: default
  annotations:
    metallb.universe.tf/address-pool: bgp-pool
  labels:
    app: tcp-echo
    system: example
spec:
  externalTrafficPolicy: Local
  selector:
    app: tcp-echo
  ports:
    - name: tcp
      protocol: TCP
      port: 2701
      targetPort: 2701
    - name: udp
      protocol: UDP
      port: 2701
      targetPort: 2701
  type: LoadBalancer
---
apiVersion: k8s.ovn.org/v1
kind: EgressService
metadata:
  name: go-echo-service  # must match the Service name
  namespace: default
spec:
  sourceIPBy: LoadBalancerIP
