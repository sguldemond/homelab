# Derived from https://github.com/ovn-kubernetes/ovn-kubernetes/blob/master/helm/ovn-kubernetes/values-single-node-zone.yaml
# Original upstream file preserved at projects/ovn-kubernetes/values-single-node-zone.yaml
# Only values changed from upstream defaults are annotated below.

tags:
  ovn-ipsec: false
  ovnkube-db: false
  ovnkube-db-raft: false
  ovnkube-master: false
  ovnkube-node: false
  ovnkube-node-dpu: false
  ovnkube-single-node-zone-dpu: false
  ovnkube-node-dpu-host: false
  ovnkube-zone-controller: false

# mm1 control plane IP (upstream default: 172.25.0.2)
k8sAPIServer: https://192.168.2.60:6443
# k3s default pod CIDR (upstream default: 10.244.0.0/16/24)
podNetwork: 10.42.0.0/16/24
# k3s default service CIDR (upstream default: 10.96.0.0/16)
serviceNetwork: 10.43.0.0/16
mtu: 1400
skipCallToK8s: false

global:
  extGatewayNetworkInterface: ""
  encapPort: 6081
  gatewayMode: shared
  gatewayOpts: ""
  unprivilegedMode: false
  v4JoinSubnet: "100.64.0.0/16"
  v4MasqueradeSubnet: "169.254.0.0/17"
  v4TransitSubnet: "100.88.0.0/16"
  v6JoinSubnet: "fd98::/64"
  v6MasqueradeSubnet: "fd69::/112"
  v6TransitSubnet: "fd97::/64"
  # Disabled to avoid webhook/bootstrap deadlock on k3s (upstream default: true)
  enableOvnKubeIdentity: false
  enableCompactMode: false
  enableHybridOverlay: ""
  hybridOverlayNetCidr: ""
  enableAdminNetworkPolicy: false
  enableEgressIp: true
  egressIpHealthCheckPort: 9107
  enableEgressService: true
  enableEgressFirewall: true
  enableEgressQos: true
  enableNetworkQos: false
  enableMulticast: ""
  enableMultiNetwork: false
  enableNetworkSegmentation: false
  enableRouteAdvertisements: false
  enableEVPN: false
  advertiseDefaultNetwork: false
  advertisedUDNIsolationMode: "strict"
  enableNoOverlay: false
  enableNoOverlaySnat: false
  enableNoOverlayManagedRouting: false
  managedBGPASNumber: 64512
  managedBGPTopology: "full-mesh"
  managedBGPFRRNamespace: "frr-k8s-system"
  enablePreconfiguredUDNAddresses: false
  enableIpsec: false
  enableSsl: false
  enableInterconnect: true
  enableMultiExternalGateway: true
  enableStatelessNetworkPolicy: false
  enableSvcTemplate: true
  enableMetricsScale: ""
  enableConfigDuration: ""
  enableLFlowCache: true
  lFlowCacheLimit: ""
  lFlowCacheLimitKb: ""
  enablePersistentIPs: true
  enableDNSNameResolver: false
  allowICMPNetworkPolicy: false
  disableSnatMultipleGws: ""
  disableForwarding: ""
  disablePacketMtuCheck: ""
  aclLoggingRateLimit: 20
  emptyLbEvents: ""
  nbPort: 6641
  sbPort: 6642
  netFlowTargets: ""
  sflowTargets: ""
  ipfixTargets: ""
  ipfixSampling: ""
  ipfixCacheMaxFlows: ""
  ipfixCacheActiveTimeout: ""
  remoteProbeInterval: 100000
  monitorAll: ""
  ofctrlWaitBeforeClear: ""
  libovsdbClientLogFile: ""
  image:
    repository: ghcr.io/ovn-kubernetes/ovn-kubernetes/ovn-kube-ubuntu
    tag: master
    pullPolicy: IfNotPresent

monitoring:
  enableServiceMonitor: false
  enablePrometheusRule: false
