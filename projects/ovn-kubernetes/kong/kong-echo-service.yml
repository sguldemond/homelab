---
apiVersion: v1
kind: Service
metadata:
  name: go-echo-service
  labels:
    app: tcp-echo
    system: example
spec:
  externalTrafficPolicy: Local
  selector:
    app: tcp-echo
  ports:
  - protocol: TCP
    port: 2701
    targetPort: 2701
    name: tcp # missing from source, weird
  - protocol: UDP
    port: 2701 
    targetPort: 2701
    name: udp # missing from source, weird

  type: LoadBalancer
