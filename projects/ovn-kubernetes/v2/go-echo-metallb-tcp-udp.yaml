---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: egress-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.2.120/32
  autoAssign: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: egress-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - egress-pool
  # Pin to OVN bridge interfaces so ARP goes out on the physical network.
  # externalTrafficPolicy: Local on services handles node selection automatically.
  interfaces:
    - brenp1s0f0
    - brens9
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-echo-deployment
  labels:
    app: go-echo
spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: go-echo
  template:
    metadata:
      labels:
        app: go-echo
    spec:
      containers:
      - name: go-echo-container
        image: kong/go-echo
        imagePullPolicy: Always
        env:
        - name: TCP_PORT
          value: '1025'
        - name: UDP_PORT
          value: '1025'
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        ports:
        - name: tcp-echo-port
          containerPort: 1025
        - name: udp-echo-port
          protocol: UDP
          containerPort: 1025
---
apiVersion: v1
kind: Service
metadata:
  name: go-echo-service
  namespace: default
  annotations:
    metallb.universe.tf/address-pool: egress-pool
spec:
  externalTrafficPolicy: Local
  selector:
    app: go-echo
  ports:
    - name: tcp
      protocol: TCP
      port: 1025
      targetPort: 1025
    - name: udp
      protocol: UDP
      port: 1025
      targetPort: 1025
  type: LoadBalancer
---
apiVersion: k8s.ovn.org/v1
kind: EgressService
metadata:
  name: go-echo-service  # must match the Service name
  namespace: default
spec:
  sourceIPBy: LoadBalancerIP
