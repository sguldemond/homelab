apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: egress-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - egress-pool
  # Pin to OVN bridge interfaces so ARP goes out on the physical network.
  # externalTrafficPolicy: Local on services handles node selection automatically.
  interfaces:
    - brenp1s0f0
    - brens9
