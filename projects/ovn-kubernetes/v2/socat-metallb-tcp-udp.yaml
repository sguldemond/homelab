---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: egress-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.2.120/32
  autoAssign: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: egress-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - egress-pool
  # Pin to OVN bridge interfaces so ARP goes out on the physical network.
  # externalTrafficPolicy: Local on services handles node selection automatically.
  interfaces:
    - brenp1s0f0
    - brens9
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socat-echo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socat-echo
  template:
    metadata:
      labels:
        app: socat-echo
    spec:
      containers:
        - name: tcp-echo
          image: alpine/socat
          args: ["TCP4-LISTEN:8000,fork,reuseaddr", "PIPE"]
          ports:
            - containerPort: 8000
              protocol: TCP
        - name: udp-echo
          image: alpine/socat
          args: ["UDP4-LISTEN:8000,fork,reuseaddr", "PIPE"]
          ports:
            - containerPort: 8000
              protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: socat-echo-service
  namespace: default
  annotations:
    metallb.universe.tf/address-pool: egress-pool
spec:
  externalTrafficPolicy: Local
  selector:
    app: socat-echo
  ports:
    - name: tcp
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: udp
      protocol: UDP
      port: 8000
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: k8s.ovn.org/v1
kind: EgressService
metadata:
  name: socat-echo-service  # must match the Service name
  namespace: default
spec:
  sourceIPBy: LoadBalancerIP
